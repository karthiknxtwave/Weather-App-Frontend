<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>

    <link rel="stylesheet" href="./css/variables.css">
    <link rel="stylesheet" href="./css/styles.css">
    <link rel="stylesheet" href="./css/responsive.css">
</head>

<body data-theme="light">

    <div class="container">

        <header class="app-header">
            <h1 class="logo">Weather App</h1>

            <nav class="nav-links">
                <a href="#">Dashboard</a>
                <a href="#">Map</a>
                <a href="#">Education</a>
                <a href="#">Historical</a>
            </nav>

            <button class="theme-toggle" aria-label="Toggle theme">
                🌙
            </button>
        </header>

        <main>

            <section class="search-section">
                <section class="search-section">

                    <form class="search-form">
                        <input type="text" class="city-input" placeholder="Search for a city..." />

                        <button type="submit">
                            Search
                        </button>
                    </form>

                    <div class="loading-message hidden">
                        Loading...
                    </div>

                    <div class="error-message hidden">
                    </div>

                </section>
            </section>

            <section class="current-weather-section">
                <section class="current-weather-section">

                    <div class="weather-card">

                        <div class="weather-header">

                            <div>
                                <h2 class="city-name">--</h2>

                                <p class="weather-date">
                                    --
                                </p>
                            </div>

                            <div class="temperature-display">
                                --
                            </div>

                        </div>

                        <div class="weather-condition">

                            <span class="condition-icon">
                                ☀️
                            </span>

                            <span class="condition-label">
                                --
                            </span>

                        </div>

                        <div class="weather-stats">

                            <div class="stat-card">
                                <span>Humidity</span>
                                <strong class="humidity-value">
                                    --
                                </strong>
                            </div>

                            <div class="stat-card">
                                <span>Wind</span>
                                <strong class="wind-value">
                                    --
                                </strong>
                            </div>

                            <div class="stat-card">
                                <span>Pressure</span>
                                <strong class="pressure-value">
                                    --
                                </strong>
                            </div>

                        </div>

                    </div>

                </section>
            </section>

            <section class="forecast-section">
                <h2>5-Day Forecast</h2>
                <div class="forecast-list">
                </div>
            </section>

            <section class="hourly-insights-section">
                <h2>Hourly Insights</h2>
                <div class="hourly-list">
                </div>
            </section>

        </main>

        <footer class="app-footer">
            <a href="#">Privacy Policy</a>
            <a href="#">Terms of Service</a>
            <a href="#">Scientific Data Sources</a>
        </footer>

    </div>

    <script src="./js/theme.js"></script>
    <script src="./js/api.js"></script>
    <script src="./js/weather-mapper.js"></script>
    <script src="./js/ui.js"></script>
    <script src="./js/app.js"></script>
</body>

</html>
