<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>

    <link rel="stylesheet" href="./css/variables.css">
    <link rel="stylesheet" href="./css/styles.css">
    <link rel="stylesheet" href="./css/responsive.css">
</head>
<body data-theme="light">

    <div class="container">

        <header class="app-header">
            <h1 class="logo">Weather App</h1>

            <nav class="nav-links">
                <a href="#">Dashboard</a>
                <a href="#">Map</a>
                <a href="#">Education</a>
                <a href="#">Historical</a>
            </nav>

            <button
                class="theme-toggle"
                aria-label="Toggle theme"
            >
                🌙
            </button>
        </header>

        <main>

            <section class="search-section">
                <h2>Search City</h2>
                <p>Search bar will be added later.</p>
            </section>

            <section class="current-weather-section">
                <h2>Current Weather</h2>
                <p>Weather card placeholder.</p>
            </section>

            <section class="forecast-section">
                <h2>5-Day Forecast</h2>
                <p>Forecast placeholder.</p>
            </section>

            <section class="hourly-insights-section">
                <h2>Hourly Insights</h2>
                <p>Hourly data placeholder.</p>
            </section>

        </main>

        <footer class="app-footer">
            <a href="#">Privacy Policy</a>
            <a href="#">Terms of Service</a>
            <a href="#">Scientific Data Sources</a>
        </footer>

    </div>

    <script src="./js/theme.js"></script>
    <script src="./js/app.js"></script>

</body>
</html>
